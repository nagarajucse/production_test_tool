<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS — Authentication</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #21262d;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --accent2: #3fb950;
            --text: #e6edf3;
            --muted: #7d8590;
            --radius: 12px;
            --error: #f85149;
            --success: #3fb950;
            --warning: #d29922;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Video Background ── */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(13, 17, 23, 0.75) 0%, rgba(10, 12, 16, 0.85) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* ── Background decoration ── */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(13, 17, 23, 0) 70%);
            z-index: 2;
            pointer-events: none;
        }

        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; }

        /* ── Card container ── */
        .auth-card {
            background: rgba(22, 27, 34, 0.75);
            border: 1px solid rgba(49, 56, 67, 0.45);
            border-radius: var(--radius);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
            position: relative;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #79c0ff);
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.4);
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ── Forms ── */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            padding: 10px 12px;
            outline: none;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn {
            width: 100%;
            background: var(--accent);
            color: #0d1117;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            padding: 11px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }

        /* ── Alerts ── */
        .alert {
            display: none;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
        }

        .alert-error {
            background: rgba(248, 81, 73, 0.15);
            color: var(--error);
            border: 1px solid rgba(248, 81, 73, 0.2);
        }

        .alert-success {
            background: rgba(63, 185, 80, 0.15);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, 0.2);
        }

        .alert-info {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(13, 17, 23, 0.2);
            border-top-color: #0d1117;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Video Background -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="/static/Biometric_fingerprint_scanning_a…_202606231712.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="auth-card">
        <div class="header">
            <div class="brand-container" style="display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
                <img src="/static/logo_icon.png" alt="Aratek Logo Icon" style="height: 48px; object-fit: contain;">
            </div>
            <div class="title" id="cardTitle">DMS Portal</div>
            <div class="subtitle" id="cardSubtitle">Please sign in to access the dashboard</div>
        </div>

        <div class="alert" id="alertAuth"></div>

        <form id="authForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control"
                       placeholder="Enter username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control"
                       placeholder="Enter password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Sign In</span>
            </button>
        </form>
    </div>

    <script>
        function showAlert(boxId, type, message) {
            const el = document.getElementById(boxId);
            el.className = `alert alert-${type}`;
            el.textContent = message;
            el.style.display = 'block';
        }

        function hideAlert(boxId) {
            document.getElementById(boxId).style.display = 'none';
        }

        function setLoading(btnId, spinnerId, textId, loading, text) {
            document.getElementById(btnId).disabled = loading;
            document.getElementById(spinnerId).style.display = loading ? 'block' : 'none';
            document.getElementById(textId).textContent = text;
        }

        async function handleSubmit(event) {
            event.preventDefault();
            hideAlert('alertAuth');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            setLoading('submitBtn', 'btnSpinner', 'btnText', true, 'Signing in…');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('alertAuth', 'success', 'Authentication successful! Redirecting…');
                    setTimeout(() => { window.location.href = '/dashboard'; }, 800);
                } else {
                    showAlert('alertAuth', 'error', data.message || 'An error occurred.');
                }
            } catch {
                showAlert('alertAuth', 'error', 'Connection to server failed. Please try again.');
            } finally {
                setLoading('submitBtn', 'btnSpinner', 'btnText', false, 'Sign In');
            }
        }
    </script>
</body>
</html>
